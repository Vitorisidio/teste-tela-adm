<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script src="./app.js" type="module" defer></script>
    <title>Lista de Produtos</title>
</head>

<body>

    <header>

         <!-- Logo da empresa -->
        <img class=" logo" src="./img/logo.png" alt="logo">

         <!-- Botão para adicionar um novo produto -->
        <button class="btnProduto">
            <p>Novo prroduto</p>
        </button>

    </header>

    <main>
         <!-- Container que armazenará todos os cards de produtos -->
        <div class="container">

             <!-- Card de produto -->
            <div class="card">

                <!-- Área destinada à imagem do produto -->
                <div class="foto">
                    <img src="./img/Screenshot.png" alt="">
                </div>

                <!-- Área com as informações do produto -->
                <div class="informacao">

                    <!-- Nome do produto -->
                    <p class="titulo">Cappuccino Clássico</p>
                    <!-- descrição do produto -->
                    <p class="descricao">Cremoso e marcante.</p>
                    <!-- Preço do produto -->
                    <p class="preco">R$ 00,00</p>

                    <!-- Área dos botões de interação -->
                    <div class="botoesInteracao">

                         <!-- Botão para editar o produto -->
                        <div class="btn btnEditar">
                            <p>Editar</p>
                        </div>

                         <!-- Botão para excluir o produto -->
                        <div class="btn btnExcluir">
                            <p>Excluir</p>
                        </div>

                    </div>

                </div>

            </div>


            

        </div>

        </div>
        </div>
    </main>


</body>

</html>
